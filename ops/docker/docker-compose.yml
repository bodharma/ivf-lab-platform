services:
  app:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    env_file: ../../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks: [ivf-net]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ivf_lab
      POSTGRES_USER: ivf_app
      POSTGRES_PASSWORD: ${IVF_DB_PASSWORD:-ivf_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ivf_app -d ivf_lab"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [ivf-net]

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks: [ivf-net]

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../frontend/apps/embryologist-console/dist:/usr/share/nginx/html:ro
      - certbot-data:/etc/letsencrypt:ro
    depends_on: [app]
    restart: unless-stopped
    networks: [ivf-net]

  grafana:
    image: grafana/grafana-oss
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    restart: unless-stopped
    networks: [ivf-net]

  loki:
    image: grafana/loki:latest
    volumes:
      - loki-data:/loki
    restart: unless-stopped
    networks: [ivf-net]

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks: [ivf-net]

volumes:
  pgdata:
  redisdata:
  certbot-data:
  grafana-data:
  loki-data:
  prometheus-data:

networks:
  ivf-net:
    driver: bridge
